<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Track Order â Sofia's Store</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f9fafb;--bg3:#f3f4f6;--border:#e5e7eb;--border2:#d1d5db;--accent:#2563eb;--accent2:#1d4ed8;--accent-light:#eff6ff;--text:#111827;--text2:#374151;--muted:#6b7280;--muted2:#9ca3af;--red:#ef4444;--green:#22c55e;--sans:'Inter','Segoe UI',sans-serif;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 4px 6px rgba(0,0,0,.05),0 10px 40px rgba(0,0,0,.08)}
body{font-family:var(--sans);background:var(--bg2);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:sticky;top:0;z-index:500;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.2rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:-.02em}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:900;flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:6px;padding:.5rem .9rem;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;background:#fff;border:1px solid var(--border);color:var(--text2);transition:.2s}
.nav-btn:hover{background:var(--bg2);border-color:var(--border2)}
.wrap{max-width:560px;margin:0 auto;padding:3rem 1.5rem}
.page-title{font-size:1.8rem;font-weight:800;margin-bottom:.25rem;color:var(--text);letter-spacing:-.02em}
.page-sub{color:var(--muted);font-size:.9rem;margin-bottom:2rem}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.flbl{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.4rem;letter-spacing:.02em}
.finp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:.72rem 1rem;font-size:.9rem;font-family:var(--sans);outline:none;transition:.2s;margin-bottom:1rem}
.finp:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.finp::placeholder{color:var(--muted2)}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:.82rem;border-radius:10px;font-weight:600;font-size:.9rem;cursor:pointer;border:none;transition:.2s;font-family:var(--sans);width:100%}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.25)}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
/* STATUS BADGES */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:.3rem .75rem;border-radius:6px;font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.s-paid,.s-delivered{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}
.s-processing,.s-shipped{background:var(--accent-light);border:1px solid #bfdbfe;color:var(--accent)}
.s-pending{background:#fffbeb;border:1px solid #fde68a;color:#d97706}
.s-cancelled,.s-refunded{background:#fef2f2;border:1px solid #fecaca;color:var(--red)}
/* ORDER RESULT */
.item-row{display:flex;justify-content:space-between;align-items:center;padding:.85rem 0;border-bottom:1px solid var(--border);font-size:.875rem}
.item-row:last-child{border-bottom:none}
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:1rem;color:var(--red);font-size:.875rem;margin-top:.75rem}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <div class="logo-icon">S</div>
    Sofia's Store
  </a>
  <a href="/" class="nav-btn">â Back to Shop</a>
</nav>

<div class="wrap">
  <div class="page-title">Track Your Order</div>
  <p class="page-sub">Enter your email and order number to view your order status.</p>

  <div class="card">
    <label class="flbl">Email Address</label>
    <input class="finp" type="email" id="email" placeholder="you@example.com"/>
    <label class="flbl">Order Number</label>
    <input class="finp" type="text" id="orderNum" placeholder="ORD-240101-1234" oninput="this.value=this.value.toUpperCase()"/>
    <button class="btn btn-primary" id="lookupBtn" onclick="lookup()">ð &nbsp;Find My Order</button>
    <div id="err" class="err" style="display:none"></div>
  </div>

  <div id="result" style="display:none"></div>
</div>

<script>
async function lookup() {
  const email  = document.getElementById('email').value.trim();
  const num    = document.getElementById('orderNum').value.trim();
  const btn    = document.getElementById('lookupBtn');
  const errEl  = document.getElementById('err');
  errEl.style.display = 'none';
  if (!email || !num) { errEl.textContent='Please fill in both fields.';errEl.style.display='block';return; }
  btn.disabled=true; btn.textContent='Searchingâ¦';
  try {
    const res  = await fetch(`/api/orders/lookup?email=${encodeURIComponent(email)}&order_number=${encodeURIComponent(num)}`);
    const data = await res.json();
    btn.disabled=false; btn.innerHTML='ð &nbsp;Find My Order';
    if (!res.ok) { errEl.textContent = data.error||'Order not found.'; errEl.style.display='block'; return; }
    renderOrder(data.order);
  } catch(e) {
    btn.disabled=false; btn.innerHTML='ð &nbsp;Find My Order';
    errEl.textContent='Network error. Please try again.'; errEl.style.display='block';
  }
}

function renderOrder(order) {
  const statusClass = 's-' + order.status;
  const statusLabel = order.status.charAt(0).toUpperCase() + order.status.slice(1);
  document.getElementById('result').style.display='block';
  document.getElementById('result').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem">
        <div>
          <div style="font-size:1.15rem;font-weight:700;color:var(--text)">${order.order_number}</div>
          <div style="font-size:.8rem;color:var(--muted);margin-top:.25rem">${new Date(order.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
        </div>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:1.25rem">
        ð§ ${order.customer_email}
        ${order.shipping_address ? `<br>ð ${order.shipping_address}` : ''}
      </div>
      ${order.items && order.items.length ? order.items.map(i => `
        <div class="item-row">
          <div>
            <div style="font-weight:600;color:var(--text)">${i.name}</div>
            <div style="color:var(--muted);font-size:.8rem">Qty: ${i.quantity} Â· $${(i.price/100).toFixed(2)} each</div>
          </div>
          <div style="font-weight:700;color:var(--text)">$${(i.subtotal/100).toFixed(2)}</div>
        </div>
      `).join('') : ''}
      <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
        ${order.shipping > 0 ? `<div style="display:flex;justify-content:space-between;font-size:.875rem;color:var(--muted);margin-bottom:.4rem"><span>Shipping</span><span>${order.shipping_formatted}</span></div>` : ''}
        ${order.tax > 0 ? `<div style="display:flex;justify-content:space-between;font-size:.875rem;color:var(--muted);margin-bottom:.4rem"><span>Tax</span><span>${order.tax_formatted}</span></div>` : ''}
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1rem;color:var(--text)">
          <span>Total</span><span>${order.total_formatted}</span>
        </div>
      </div>
    </div>
  `;
}
document.addEventListener('keydown', e => { if (e.key==='Enter') lookup(); });
</script>
</body>
</html>
